<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no, viewport-fit=cover" />

    <!-- PWA Meta Principal -->
    <title>InspeccionApp Copetran</title>
    <meta name="description" content="Reporte de daños de equipos Copetran" />
    <meta name="application-name" content="InspeccionApp" />
    <meta name="theme-color" content="#1565C0" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA iOS (Apple) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="InspeccionApp" />
    <link rel="apple-touch-icon" href="./logoouser.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./logoouser.png" />

    <!-- React Native Web reset -->
    <style id="expo-reset">
      *, *::before, *::after { box-sizing: border-box; }
      html {
        height: 100%;
        height: -webkit-fill-available;
        margin: 0;
        padding: 0;
      }
      body {
        height: 100%;
        height: 100dvh;
        min-height: -webkit-fill-available;
        margin: 0;
        padding: 0;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        background-color: #09090B;
        position: fixed;
        width: 100%;
        top: 0;
        left: 0;
      }
      #root {
        display: flex;
        height: 100%;
        height: 100dvh;
        width: 100%;
        flex: 1;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
      }
    </style>
  </head>

  <body>
    <noscript>Necesitas activar JavaScript para usar esta app.</noscript>
    <div id="root"></div>

    <!-- Registro del Service Worker para PWA offline -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          // Detectar base path automáticamente (dev vs producción)
          var swUrl = './service-worker.js';
          navigator.serviceWorker
            .register(swUrl)
            .then(function (reg) {
              console.log('[PWA] Service Worker registrado:', reg.scope);
            })
            .catch(function (err) {
              console.warn('[PWA] Service Worker no disponible (normal en dev):', err.message);
            });
        });
      }
    </script>
  </body>
</html>
