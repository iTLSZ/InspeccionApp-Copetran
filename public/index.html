<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />

    <!-- PWA Meta Principal -->
    <title>InspeccionApp Copetran</title>
    <meta name="description" content="Reporte de daños de equipos Copetran" />
    <meta name="application-name" content="InspeccionApp" />
    <meta name="theme-color" content="#1565C0" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA iOS (Apple) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="InspeccionApp" />
    <link rel="apple-touch-icon" href="/InspeccionApp-Copetran/logoouser.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/InspeccionApp-Copetran/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/InspeccionApp-Copetran/logoouser.png" />

    <!-- React Native Web reset -->
    <style id="expo-reset">
      html, body { height: 100%; margin: 0; padding: 0; }
      body { overflow: hidden; background-color: #1565C0; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
  </head>

  <body>
    <noscript>Necesitas activar JavaScript para usar esta app.</noscript>
    <div id="root"></div>

    <!-- Registro del Service Worker para PWA offline -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/InspeccionApp-Copetran/service-worker.js')
            .then(function (reg) {
              console.log('[PWA] Service Worker registrado:', reg.scope);
            })
            .catch(function (err) {
              console.warn('[PWA] Service Worker error:', err);
            });
        });
      }
    </script>
  </body>
</html>
